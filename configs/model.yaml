# Percepción — modelo y tracker (plan M2, r4 #12)
# Backend/checkpoint EXPLÍCITO: la rama RTX 3090 carga el .engine TensorRT
# exportado en M1 (no el .pt, que invalidaría el benchmark de latencia).

model:
  # PROMOCIÓN ft2 (H4-P0, 2026-07-18): fine-tune CrowdPose+COCO30k, cumplió
  # ambos umbrales GO/NO-GO (+2.96 CrowdPose / −0.70 COCO) y la revisión visual
  # del usuario. Engine DINÁMICO (válido 640 grupo / 1280 masa).
  realtime_checkpoint: "outputs/harmocap-m-pose-ft2.engine"
  fallback_checkpoint: "harmocap-m-pose-ft2.pt"        # fine-tuned by Mariano (release models-v1)
  smoke_checkpoint: "yolo26n-pose.pt"                  # SOLO smoke-test del workflow (M0/M1)
  imgsz: 640
  device: "auto"        # cuda:0 (NVIDIA) / mps (Apple Silicon) / cpu — autodetecta
  conf: 0.05            # decisión usuario 2026-07-18 tras barrido: sin fantasmas visibles,
                        # recall > precision para nuestro caso; además alimenta la 2da
                        # asociación de ByteTrack (−16% churn de IDs medido). Piso efectivo
                        # del tracker: track_low_thresh=0.1.
  max_det: 300          # decisión usuario: "al máximo siempre" — el tope de detección no
                        # limita los slots (el SlotManager elige a quién dar los 8);
                        # barrido midió que maxdet=8 recortaba −20% de personas en multitud
  # nota barrido 2026-07-18: `iou` es perilla MUERTA en YOLO26 (NMS-free) — no tunear

tracker:
  name: "bytetrack.yaml"   # el más barato (pack §C); OC-SORT si movimiento no-lineal
  persist: true
  stream_buffer: false     # descarta frames viejos (tiempo real)
