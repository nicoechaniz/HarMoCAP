# Tracker LIVIANO: BoT-SORT sin ReID ni compensación de movimiento.
# Para cámara FIJA y/o hardware sin placa: no corre la red de apariencia
# (yolo26n-cls) ni el flujo óptico, que son el grueso del costo de
# tracker_group.yaml. La identidad tras oclusión larga es más frágil; la
# capa 3 (reasociación de slots) sigue disponible y no depende de apariencia.
tracker_type: botsort
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.25
track_buffer: 60
match_thresh: 0.8
fuse_score: True
gmc_method: none
proximity_thresh: 0.5
appearance_thresh: 0.8
with_reid: False
